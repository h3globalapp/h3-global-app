<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>H3 Global – Runs</title>
  <!-- CRITICAL: Added viewport-fit=cover -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="./manifest.json">
  
  <!-- Android -->
  <meta name="mobile-web-app-capable" content="yes">
  
  <!-- iOS PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="H3 Global App">
  <link rel="apple-touch-icon" href="/icon-192x192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-180x180.png">
  
  <!-- Theme Color -->
  <meta name="theme-color" content="#FF6D00">
  <meta name="background-color" content="#FFFFFF">
  
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏃</text></svg>">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/base.css"/>
  <link rel="stylesheet" href="css/screens/runs.css"/>
  <!-- In <head> or at start of <body> -->
<script type="module" src="js/subscription-guard.js"></script>

  
  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
     navigator.serviceWorker.register('./sw.js')
        .then((reg) => {
          console.log('SW registered:', reg.scope);
          if (!navigator.serviceWorker.controller) {
            reg.active?.postMessage({ type: 'CLAIM_CONTROL' });
          }
        })
        .catch((err) => console.log('SW registration failed:', err));
    }
  </script>
  
  
  <!-- Badge Service -->
  <script type="module">
    import badgeService from './js/screens/badge-service.js';
    window.badgeService = badgeService;
    badgeService.init();
  </script>
  <!-- PWA Install Banner Styles -->
<style>
  #install-banner {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: linear-gradient(135deg, #FF6D00 0%, #FF8F00 100%);
    color: white;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 99998;
    transform: translateY(-100%);
    transition: transform 0.3s ease;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  #install-banner.visible {
    transform: translateY(0);
  }
  #install-banner .banner-text {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 500;
  }
  #install-banner .banner-icon {
    font-size: 20px;
  }
  #install-banner .banner-buttons {
    display: flex;
    gap: 8px;
  }
  #install-banner button {
    padding: 8px 16px;
    border: none;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  #install-banner button:hover {
    opacity: 0.9;
  }
  #install-btn {
    background: white;
    color: #FF6D00;
  }
  #dismiss-btn {
    background: rgba(255,255,255,0.2);
    color: white;
  }
  /* Push content down when banner shows */
  body.banner-visible {
    padding-top: 60px;
  }
  /* Hide if already installed */
  @media (display-mode: standalone) {
    #install-banner { display: none !important; }
  }
</style>

</head>
<body>
  <!-- PWA Install Banner -->
<div id="install-banner">
  <div class="banner-text">
    <span class="banner-icon">🏃</span>
    <span>Install H3 Global for quick access!</span>
  </div>
  <div class="banner-buttons">
    <button id="install-btn" type="button">Install</button>
    <button id="dismiss-btn" type="button">Later</button>
  </div>
</div>
<!-- Header -->
<header class="page-header">
  <h1 id="tvHeader">Runs in [State]</h1>
</header>

<!-- Add Run Button (Visible only to Tier 1/2 Admins) -->
<button type="button" id="btnAddRun" class="btn-add-run hidden">+ Add Run</button>

<!-- Runs List -->
<main class="runs-container" id="runsContainer">
  <div id="runsList" class="runs-list"></div>
  
  <!-- Empty State -->
  <div id="emptyState" class="empty-state hidden">
    <p>No runs found in your state.</p>
  </div>
</main>

<!-- Loading Spinner -->
<div id="progressBarLoading" class="loading-spinner hidden">
  <div class="spinner"></div>
</div>

<nav class="bottom-nav">
  <a href="#" class="nav-item" data-screen="home">
    <img src="icons/ic_home.png" alt="" class="nav-icon"/>
    <span>Home</span>
  </a>
  <a href="#" class="nav-item active" data-screen="runs">
    <img src="icons/ic_runs.png" alt="" class="nav-icon"/>
    <span>Runs</span>
  </a>
  <a href="#" class="nav-item" data-screen="trails">
    <img src="icons/ic_trails.png" alt="" class="nav-icon"/>
    <span>Trails</span>
  </a>
  <a href="#" class="nav-item" data-screen="chat">
    <img src="icons/ic_chat.png" alt="" class="nav-icon"/>
    <span>Chat</span>
  </a>
  <a href="#" class="nav-item" data-screen="more">
    <img src="icons/ic_more.png" alt="" class="nav-icon"/>
    <span>More</span>
  </a>
</nav>

<script src="js/screens/runs.js" type="module"></script>

<!-- Run Details Dialog -->
<div id="runDetailsDialog" class="hidden dialog-overlay">
  <div class="dialog-content">
    <div class="dialog-header">
      <h2>Run Details</h2>
      <button type="button" id="btnCloseDetails" class="btn-close">&times;</button>
    </div>
    <div class="dialog-body">
      <img id="detailImage" src="" alt="Run" class="detail-image"/>
      <div id="detailInfo" class="detail-info"></div>
      <button type="button" id="btnNavigate" class="btn-navigate">Navigate on Map</button>
    </div>
  </div>
</div>

<!-- Payment Dialog - Exact match to event detail -->
<div id="paymentDialog" class="hidden dialog-overlay">
  <div id="paymentContent"></div>
</div>

<!-- Admin Call Dialog -->
<div id="adminCallDialog" class="hidden dialog-overlay">
  <div class="dialog-content">
    <div class="dialog-header">
      <h2>Call Admin for Payment Confirmation</h2>
    </div>
    <div class="dialog-body">
      <div id="adminCallList"></div>
    </div>
    <div class="dialog-footer">
      <button type="button" id="btnCloseAdminCall" class="btn-save">ON ON</button>
    </div>
  </div>
</div>

<!-- Delete Confirmation Dialog -->
<div id="deleteDialog" class="hidden dialog-overlay">
  <div class="dialog-content">
    <div class="dialog-header">
      <h2>Delete Run</h2>
    </div>
    <div class="dialog-body">
      <p id="deleteMessage">Permanently remove this run?</p>
    </div>
    <div class="dialog-footer">
      <button type="button" id="btnCancelDelete" class="btn-secondary">Cancel</button>
      <button type="button" id="btnConfirmDelete" class="btn-delete">Delete</button>
    </div>
  </div>
</div>
  <!-- PWA Auto-Install Prompt -->
<script>
  let deferredPrompt;
  const installBanner = document.getElementById('install-banner');
  const installBtn = document.getElementById('install-btn');
  const dismissBtn = document.getElementById('dismiss-btn');

  // Check if already installed as PWA
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches 
    || window.navigator.standalone === true;
  
  if (!isStandalone) {
    // Listen for install prompt
    window.addEventListener('beforeinstallprompt', (e) => {
      console.log('beforeinstallprompt fired');
      e.preventDefault();
      deferredPrompt = e;
      
      // Show banner after short delay
      setTimeout(() => {
        installBanner.classList.add('visible');
        document.body.classList.add('banner-visible');
      }, 1000);
    });

    // Handle Install button
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log(`User ${outcome === 'accepted' ? 'installed' : 'dismissed'} the app`);
      
      installBanner.classList.remove('visible');
      document.body.classList.remove('banner-visible');
      deferredPrompt = null;
    });

    // Handle Dismiss button — just hide, no memory
    dismissBtn.addEventListener('click', () => {
      installBanner.classList.remove('visible');
      document.body.classList.remove('banner-visible');
      // No localStorage — banner will show again on next refresh!
    });
  }
</script>
</body>
</html>
