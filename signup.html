<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>H3 Global – Sign Up</title>
  <!-- CRITICAL: Added viewport-fit=cover -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="./manifest.json">
  
  <!-- Android -->
  <meta name="mobile-web-app-capable" content="yes">
  
  <!-- iOS PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="H3 Global App">
  <link rel="apple-touch-icon" href="/icon-192x192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-180x180.png">
  
  <!-- Theme Color -->
  <meta name="theme-color" content="#FF6D00">
  <meta name="background-color" content="#FFFFFF">
  
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏃</text></svg>">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/base.css"/>
  <link rel="stylesheet" href="css/screens/signup.css"/>
  
  <!-- Service Worker Registration (BEFORE Firebase) -->
  <script>
    if ('serviceWorker' in navigator) {
     navigator.serviceWorker.register('./sw.js')
        .then((reg) => console.log('SW registered:', reg.scope))
        .catch((err) => console.log('SW registration failed:', err));
    }
  </script>
  
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyBhhU-vo9qmMKETOdjgz24JrsRv-rojUBc",
      authDomain: "h3-global-app.firebaseapp.com",
      projectId: "h3-global-app",
      storageBucket: "h3-global-app.firebasestorage.app",
      messagingSenderId: "174897234240",
      appId: "1:174897234240:web:74612994c432f410843aa5"
    };
    
    const app = initializeApp(firebaseConfig);
    window.db = getFirestore(app);
    console.log("Firebase initialized!");
  </script>
  <!-- PWA Install Banner Styles -->
<style>
  #install-banner {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: linear-gradient(135deg, #FF6D00 0%, #FF8F00 100%);
    color: white;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 99998;
    transform: translateY(-100%);
    transition: transform 0.3s ease;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  #install-banner.visible {
    transform: translateY(0);
  }
  #install-banner .banner-text {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 500;
  }
  #install-banner .banner-icon {
    font-size: 20px;
  }
  #install-banner .banner-buttons {
    display: flex;
    gap: 8px;
  }
  #install-banner button {
    padding: 8px 16px;
    border: none;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  #install-banner button:hover {
    opacity: 0.9;
  }
  #install-btn {
    background: white;
    color: #FF6D00;
  }
  #dismiss-btn {
    background: rgba(255,255,255,0.2);
    color: white;
  }
  /* Push content down when banner shows */
  body.banner-visible {
    padding-top: 60px;
  }
  /* Hide if already installed */
  @media (display-mode: standalone) {
    #install-banner { display: none !important; }
  }
</style>
</head>
<body>
  <!-- PWA Install Banner -->
<div id="install-banner">
  <div class="banner-text">
    <span class="banner-icon">🏃</span>
    <span>Install H3 Global for quick access!</span>
  </div>
  <div class="banner-buttons">
    <button id="install-btn" type="button">Install</button>
    <button id="dismiss-btn" type="button">Later</button>
  </div>
</div>
<!-- Header -->
<header class="signup-header">
  <img src="icons/h3_logo.svg" alt="HHH Logo" class="signup-logo"/>
  <h1>Sign Up</h1>
</header>

<!-- Scrollable form -->
<main class="signup-scroll">
  <form id="signupForm" class="signup-form">
    <!-- Hash Handle -->
    <div class="input-group">
      <label for="etHashHandle">Hash Handle</label>
      <input type="text" id="etHashHandle" placeholder="Hash Handle" required/>
    </div>

    <!-- First Name -->
    <div class="input-group">
      <label for="etFirstName">First Name (Given Name)</label>
      <input type="text" id="etFirstName" placeholder="First Name" required/>
    </div>

    <!-- Last Name -->
    <div class="input-group">
      <label for="etLastName">Last Name (Surname)</label>
      <input type="text" id="etLastName" placeholder="Last Name" required/>
    </div>

    <!-- Phone with country code -->
    <div class="phone-row">
      <select id="countryCodePicker" class="country-select">
        <option value="+234" data-flag="ng" selected>🇳🇬 +234</option>
        <option value="+1" data-flag="us">🇺🇸 +1</option>
        <option value="+44" data-flag="gb">🇬🇧 +44</option>
        <option value="+61" data-flag="au">🇦🇺 +61</option>
        <option value="+66" data-flag="th">🇹🇭 +66</option>
      </select>
      <div class="input-group phone-input">
        <label for="etPhone">Phone</label>
        <input type="tel" id="etPhone" placeholder="e.g. 8012345678" required/>
      </div>
    </div>

    <!-- Helper text -->
    <p class="helper-text">Please select Country, State, Kennel and Designation from the drop down list only, Do not type them</p>

   <!-- Country -->
<div class="input-group">
  <label for="actvCountry">Select Kennel's Country</label>
  <select id="actvCountry" required>
    <option value="" disabled selected>Select Country</option>
  </select>
</div>

<!-- State -->
<div class="input-group">
  <label for="actvState">Select Kennel's State</label>
  <select id="actvState" required disabled>
    <option value="" disabled selected>Select State</option>
  </select>
</div>

<!-- Helper text for kennel -->
<p class="helper-text">Can't find your kennel? Select (+ Add Kennel) to add a new one.</p>

<!-- Kennel -->
<div class="input-group">
  <label for="actvKennel">Select Kennel</label>
  <select id="actvKennel" required disabled>
    <option value="" disabled selected>Select Kennel</option>
  </select>
</div>

<!-- Designation -->
<div class="input-group">
  <label for="actvDesignation">Designation</label>
  <select id="actvDesignation" required disabled>
    <option value="" disabled selected>Select Designation</option>
  </select>
</div>

   <!-- Submit -->
    <button type="submit" id="btnSignup" class="signup-btn">CREATE ACCOUNT</button>
    
    <!-- Login link -->
    <div class="login-link">
      <span>Already have an account?</span>
      <a href="login.html" class="btn-login">Login</a>
    </div>
  </form>
</main>

<!-- Add Kennel Modal (hidden) -->
<div id="addKennelModal" class="modal hidden">
  <div class="modal-content">
    <h3>Add New Kennel</h3>
    <div class="input-group">
      <label for="etPrefix">Kennel Name Prefix</label>
      <input type="text" id="etPrefix" placeholder="e.g. Bangkok"/>
    </div>
    <div class="radio-group">
      <label><input type="radio" name="suffix" value="Hash House Harriers" checked/> Hash House Harriers</label>
      <label><input type="radio" name="suffix" value="Hash House Harriet"/> Hash House Harriet</label>
    </div>
    <div class="modal-actions">
      <button type="button" id="btnCancelKennel" class="btn-secondary">Cancel</button>
      <button type="button" id="btnSubmitKennel" class="btn-primary">Submit</button>
    </div>
  </div>
</div>

<script src="js/screens/signup.js" type="module"></script>
  <!-- PWA Auto-Install Prompt -->
<script>
  let deferredPrompt;
  const installBanner = document.getElementById('install-banner');
  const installBtn = document.getElementById('install-btn');
  const dismissBtn = document.getElementById('dismiss-btn');

  // Check if already installed
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches 
    || window.navigator.standalone === true;
  
  if (!isStandalone) {
    // Listen for install prompt
    window.addEventListener('beforeinstallprompt', (e) => {
      console.log('beforeinstallprompt fired');
      e.preventDefault();
      deferredPrompt = e;
      
      // Show banner after short delay
      setTimeout(() => {
        installBanner.classList.add('visible');
        document.body.classList.add('banner-visible');
      }, 1000);
    });

    // Handle Install button
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log(`User ${outcome === 'accepted' ? 'installed' : 'dismissed'} the app`);
      
      installBanner.classList.remove('visible');
      document.body.classList.remove('banner-visible');
      deferredPrompt = null;
    });

    // Handle Dismiss button
    dismissBtn.addEventListener('click', () => {
      installBanner.classList.remove('visible');
      document.body.classList.remove('banner-visible');
      localStorage.setItem('installBannerDismissed', Date.now());
    });
  }
</script>
</body>
</html>
